{% extends 'base.html' %}

{% block title %}Register - StockVision AI{% endblock %}

{% block content %}
<div class="container py-5 my-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-user-plus text-primary fs-1 mb-3"></i>
                    <h2 class="text-white outfit-font">Create Account</h2>
                    <p class="text-muted small">Begin predicting market trends with StockVision AI</p>
                </div>
                
                <form action="{{ url_for('auth.register') }}" method="POST">
                    <div class="mb-3">
                        <label for="full_name" class="form-label text-muted small">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" id="full_name" name="full_name" class="form-control form-control-custom border-start-0 ps-0" placeholder="John Doe" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted small">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" id="email" name="email" class="form-control form-control-custom border-start-0 ps-0" placeholder="john@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label text-muted small">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-key text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control form-control-custom border-start-0 ps-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label text-muted small">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-key text-muted"></i></span>
                            <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-custom border-start-0 ps-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">Register</button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-muted small">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none">Sign In here</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
