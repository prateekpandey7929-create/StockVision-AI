{% extends 'base.html' %}

{% block title %}Contact Support - StockVision AI{% endblock %}

{% block content %}
<div class="container py-4 my-5" style="max-width: 600px;">
    <div class="glass-card p-5">
        <div class="text-center mb-4">
            <i class="fa-solid fa-paper-plane text-primary fs-1 mb-3"></i>
            <h2 class="text-white outfit-font">Contact StockVision AI</h2>
            <p class="text-muted small">Submit queries, bugs, or model feedback directly to the admins.</p>
        </div>
        
        <form action="{{ url_for('main.contact') }}" method="POST">
            <div class="mb-3">
                <label for="name" class="form-label text-muted small">Full Name</label>
                <input type="text" id="name" name="name" class="form-control form-control-custom" placeholder="John Doe" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label text-muted small">Email Address</label>
                <input type="email" id="email" name="email" class="form-control form-control-custom" placeholder="john@example.com" required>
            </div>
            
            <div class="mb-3">
                <label for="subject" class="form-label text-muted small">Subject</label>
                <input type="text" id="subject" name="subject" class="form-control form-control-custom" placeholder="Model suggestion, login issue..." required>
            </div>
            
            <div class="mb-4">
                <label for="message" class="form-label text-muted small">Message Body</label>
                <textarea id="message" name="message" rows="5" class="form-control form-control-custom" placeholder="Detailed message..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary-custom w-100 py-3">Submit Message</button>
        </form>
    </div>
</div>
{% endblock %}
