{% extends 'base.html' %}

{% block title %}Sign In - StockVision AI{% endblock %}

{% block content %}
<div class="container py-5 my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5">
                <div class="text-center mb-4">
                    <i class="fa-solid fa-lock text-primary fs-1 mb-3"></i>
                    <h2 class="text-white outfit-font">Sign In</h2>
                    <p class="text-muted small">Access your predictive dashboard and watchlist</p>
                </div>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted small">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" id="email" name="email" class="form-control form-control-custom border-start-0 ps-0" placeholder="name@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-end-0"><i class="fa-solid fa-key text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control form-control-custom border-start-0 ps-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input bg-dark border-secondary" id="remember" name="remember">
                            <label class="form-check-label text-muted small" for="remember">Remember me</label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">Sign In</button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-muted small">New to StockVision AI? <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none">Register here</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
